<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GrocerEase</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .app {
      max-width: 375px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 100px;
    }

    .header {
      background: linear-gradient(135deg, #1a6b4c 0%, #0d4a33 100%);
      color: white;
      padding: 20px;
      padding-top: 50px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(26,107,76,0.2);
    }

    .header h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .header p {
      opacity: 0.8;
      font-size: 13px;
      margin-top: 4px;
      font-weight: 500;
    }

    .header-stats {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .pill {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.04);
    }

    .input-card input {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      background: #f8fafc;
      color: #1a202c;
      margin-bottom: 12px;
      -webkit-appearance: none;
      transition: all 0.2s;
    }

    .input-card input::placeholder {
      color: #94a3b8;
    }

    .input-card input:focus {
      outline: none;
      border-color: #1a6b4c;
      background: white;
      box-shadow: 0 0 0 4px rgba(26,107,76,0.08);
    }

    .btn-add {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a6b4c 0%, #2d8a63 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(26,107,76,0.3);
      transition: all 0.2s;
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin: 24px 16px 12px;
      color: #1a202c;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .item {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin: 0 16px 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.03);
      animation: slideIn 0.3s ease;
      transition: all 0.2s;
    }

    .item:active {
      transform: scale(0.98);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .item-emoji {
      font-size: 28px;
      width: 44px;
      text-align: center;
      flex-shrink: 0;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-weight: 600;
      font-size: 15px;
      color: #1a202c;
    }

    .btn-del {
      width: 36px;
      height: 36px;
      border: none;
      background: #fef2f2;
      color: #ef4444;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-del:active {
      background: #fecaca;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .big {
      font-size: 64px;
      display: block;
      margin-bottom: 16px;
    }

    .empty h3 {
      color: #475569;
      font-size: 18px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .empty p {
      font-size: 14px;
    }

    .btn-shop {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      max-width: 343px;
      margin: 0 auto;
      padding: 18px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(245,158,11,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 50;
      transition: all 0.2s;
    }

    .btn-shop:active {
      transform: scale(0.97);
    }

    .btn-shop:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .badge {
      background: rgba(0,0,0,0.15);
      padding: 3px 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, #0d4a33 0%, #1a6b4c 100%);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.active {
      display: flex;
    }

    .progress-wrap {
      position: absolute;
      top: 50px;
      left: 20px;
      right: 20px;
    }

    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #f59e0b;
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-text {
      color: white;
      font-size: 13px;
      text-align: center;
      margin-top: 10px;
      opacity: 0.9;
      font-weight: 500;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card-emoji {
      font-size: 80px;
      display: block;
      margin-bottom: 16px;
    }

    .card-name {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 28px;
      color: #1a202c;
    }

    .card-actions {
      display: flex;
      gap: 12px;
    }

    .btn-skip, .btn-buy {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-skip {
      background: #f1f5f9;
      color: #64748b;
    }

    .btn-skip:active {
      background: #e2e8f0;
    }

    .btn-buy {
      background: linear-gradient(135deg, #1a6b4c 0%, #2d8a63 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(26,107,76,0.3);
    }

    .btn-buy:active {
      transform: scale(0.97);
    }

    .hint {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 24px;
      font-weight: 500;
    }

    .results {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #f0f4f8;
      z-index: 1000;
      overflow-y: auto;
      padding-bottom: 100px;
    }

    .results.active {
      display: block;
    }

    .results-head {
      background: linear-gradient(135deg, #1a6b4c 0%, #0d4a33 100%);
      color: white;
      padding: 60px 24px 40px;
      text-align: center;
    }

    .results-head h2 {
      font-size: 28px;
      font-weight: 800;
    }

    .results-head p {
      opacity: 0.85;
      margin-top: 6px;
      font-size: 15px;
    }

    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px;
      margin-top: -30px;
    }

    .sum-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.03);
    }

    .val {
      font-size: 32px;
      font-weight: 800;
      color: #1a6b4c;
      margin-bottom: 4px;
    }

    .skip .val {
      color: #ef4444;
    }

    .lab {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .res-section {
      padding: 0 16px;
      margin-top: 24px;
    }

    .res-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #1a202c;
    }

    .res-item {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.03);
    }

    .res-emoji {
      font-size: 24px;
    }

    .res-name {
      flex: 1;
      font-weight: 600;
      font-size: 15px;
    }

    .btn-done {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      max-width: 343px;
      margin: 0 auto;
      padding: 18px;
      background: linear-gradient(135deg, #1a6b4c 0%, #2d8a63 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(26,107,76,0.35);
      z-index: 1001;
    }

    .btn-done:active {
      transform: scale(0.97);
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 2000;
      animation: fall 3s ease-out forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>🛒 GrocerEase</h1>
      <p>Your smart monthly grocery planner</p>
      <div class="header-stats">
        <span class="pill">📋 <b id="count">0</b> items</span>
      </div>
    </header>

    <div class="input-card">
      <input type="text" id="name" placeholder="What do you need? (e.g. Bananas)" autocomplete="off">
      <button class="btn-add" id="addBtn">➕ Add to List</button>
    </div>

    <div class="section-title">My List</div>
    <div id="list"></div>

    <div class="empty" id="empty">
      <span class="big">📝</span>
      <h3>Your list is empty</h3>
      <p>Type an item above and tap Add</p>
    </div>

    <button class="btn-shop" id="shopBtn" disabled>
      🛒 Start Shopping <span class="badge" id="badge">0</span>
    </button>
  </div>

  <div class="overlay" id="overlay">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
      <div class="progress-text" id="progText">Item 1 of 1</div>
    </div>

    <div class="card" id="card">
      <span class="card-emoji" id="cEmoji">🍎</span>
      <div class="card-name" id="cName">Apple</div>
      <div class="card-actions">
        <button class="btn-skip" id="skipBtn">❌ Skip</button>
        <button class="btn-buy" id="buyBtn">✅ Got It</button>
      </div>
    </div>

    <p class="hint">👆 Tap buttons or swipe left/right</p>
  </div>

  <div class="results" id="results">
    <div class="results-head">
      <h2>🎉 Shopping Complete!</h2>
      <p id="rDate">July 8, 2026</p>
    </div>

    <div class="summary">
      <div class="sum-card">
        <div class="val" id="rBought">0</div>
        <div class="lab">Got</div>
      </div>
      <div class="sum-card skip">
        <div class="val" id="rSkip">0</div>
        <div class="lab">Skipped</div>
      </div>
    </div>

    <div class="res-section">
      <div class="res-title">✅ Purchased</div>
      <div id="rPurchased"></div>
    </div>

    <div class="res-section">
      <div class="res-title">❌ Skipped</div>
      <div id="rSkipped"></div>
    </div>

    <button class="btn-done" id="doneBtn">Done — New List</button>
  </div>

  <script>
    var items = [];
    var queue = [];
    var idx = 0;
    var got = [];
    var skipped = [];
    var STORAGE_KEY = 'grocerEaseList_v1';

    var emojis = ['🍎','🍞','🥛','🥚','🧀','🍗','🍌','🥦','🍚','🍪','🧃','🥩','🍇','🥕','🧈','🥫','🍊','🥬','🍫','🥤','🧅','🍋','🥑','🌽'];

    function getEmoji(name) {
      var hash = 0;
      for (var i = 0; i < name.length; i++) {
        hash = name.charCodeAt(i) + ((hash << 5) - hash);
      }
      return emojis[Math.abs(hash) % emojis.length];
    }

    function saveList() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      } catch (e) {
        // localStorage blocked, ignore
      }
    }

    function loadList() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          items = JSON.parse(saved);
        }
      } catch (e) {
        items = [];
      }
      updateUI();
    }

    function updateUI() {
      document.getElementById('count').textContent = items.length;
      document.getElementById('badge').textContent = items.length;

      var list = document.getElementById('list');
      var empty = document.getElementById('empty');
      var btn = document.getElementById('shopBtn');

      if (items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        btn.disabled = true;
        return;
      }

      empty.style.display = 'none';
      btn.disabled = false;

      var html = '';
      for (var j = 0; j < items.length; j++) {
        html += '<div class="item">' +
          '<span class="item-emoji">' + items[j].emoji + '</span>' +
          '<div class="item-info"><div class="item-name">' + escapeHtml(items[j].name) + '</div></div>' +
          '
